<svg width="780" height="300" viewBox="0 0 780 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FinHealth360 Premium Logo</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040D1A"/>
      <stop offset="100%" stop-color="#071525"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1E3A6E"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#0EA5E9" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60D0FF"/>
      <stop offset="40%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1E6FA8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="fhG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="redG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="100%" stop-color="#AA0000"/>
    </linearGradient>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  
  <circle cx="168" cy="150" r="120" fill="url(#ringGlow)"/>

  <g transform="translate(168,150)">
    <circle cx="0" cy="0" r="105" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="98" fill="#060F1E" stroke="url(#ringStroke)" stroke-width="4.5" filter="url(#glowCyan)"/>

    <path d="M -65 -75 A 98 98 0 0 1 -50 -85" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="butt" opacity="0.05"/>
    <path d="M -50 -85 A 98 98 0 0 1 -32 -93" fill="none" stroke="#818CF8" stroke-width="3.5" stroke-linecap="butt" opacity="0.12"/>
    <path d="M -32 -93 A 98 98 0 0 1 -14 -97" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="butt" opacity="0.22"/>
    <path d="M -14 -97 A 98 98 0 0 1 5 -98" fill="none" stroke="#C026D3" stroke-width="7" stroke-linecap="butt" opacity="0.34"/>
    <path d="M 5 -98 A 98 98 0 0 1 22 -96" fill="none" stroke="#E11D48" stroke-width="9" stroke-linecap="butt" opacity="0.50"/>
    <path d="M 22 -96 A 98 98 0 0 1 36 -91" fill="none" stroke="#DC2626" stroke-width="11" stroke-linecap="butt" opacity="0.68"/>
    <path d="M 36 -91 A 98 98 0 0 1 46 -86" fill="none" stroke="#CC0000" stroke-width="13" stroke-linecap="butt" opacity="0.84"/>
    <path d="M 46 -86 A 98 98 0 0 1 49 -84" fill="none" stroke="#BB0000" stroke-width="15" stroke-linecap="round" opacity="1"/>

    <circle cx="49" cy="-84" r="26" fill="#8B0000" opacity="0.12"/>
    <circle cx="49" cy="-84" r="20" fill="#AA0000" opacity="0.18"/>
    <circle cx="49" cy="-84" r="14" fill="#CC0000" opacity="0.35"/>
    <circle cx="49" cy="-84" r="10" fill="#FF2020" filter="url(#glowRed)"/>
    <circle cx="49" cy="-84" r="10" fill="none" stroke="#FF6666" stroke-width="2" opacity="0.7"/>

    <rect x="-42" y="22" width="24" height="32" rx="5" fill="url(#bar1)" opacity="0.8"/>
    <rect x="-13" y="-6" width="24" height="60" rx="5" fill="url(#bar2)" opacity="0.9" filter="url(#glowBlue)"/>
    <rect x="16" y="-36" width="24" height="90" rx="5" fill="url(#bar3)" filter="url(#glowBlue)"/>
    <line x1="-50" y1="56" x2="48" y2="56" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glowCyan)"/>
    <line x1="-50" y1="58" x2="48" y2="58" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  </g>

  <line x1="310" y1="178" x2="740" y2="178" stroke="#38BDF8" stroke-width="1" opacity="0.25" filter="url(#glowCyan)"/>

  <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" letter-spacing="-2">
    <tspan x="308" y="162" font-size="68" font-weight="900" fill="url(#fhG)">FinHealth</tspan><tspan font-size="70" font-weight="900" fill="url(#redG)" letter-spacing="-2">360</tspan>
  </text>
  <text x="312" y="202" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="#38BDF8" letter-spacing="5" opacity="0.9">INSIGHTS  •  INTELLIGENCE  •  IMPACT</text>
</svg>
